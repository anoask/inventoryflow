## Production profile (activate with SPRING_PROFILES_ACTIVE=prod)
## Use with Railway / any managed MySQL. See README "Deployment".

server.port=${PORT:8080}

## MySQL — Railway: reference MYSQL* from the MySQL service (no localhost default: inside Docker, localhost is NOT your DB).
## Fallback DB_* is for non-Railway hosts only (both MYSQLHOST and DB_HOST must not be unset).
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${DB_HOST}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_NAME:inventoryflow}}?useSSL=${DB_USE_SSL:true}&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${DB_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASS:}}

## Portfolio / first deploy: Hibernate updates schema. For real production, prefer Flyway/Liquibase + ddl-auto=validate.
spring.jpa.hibernate.ddl-auto=update

## JWT — required in production (no default)
inventoryflow.jwt.secret=${INVENTORYFLOW_JWT_SECRET}
inventoryflow.jwt.expiration-ms=${INVENTORYFLOW_JWT_EXPIRATION_MS:86400000}
inventoryflow.jwt.issuer=${INVENTORYFLOW_JWT_ISSUER:inventoryflow-api}

## Demo seed data: off by default. Set INVENTORYFLOW_SEED_DATA=true once on an empty DB for resume demos, then turn off.
inventoryflow.seed.enabled=${INVENTORYFLOW_SEED_DATA:false}

## CORS — comma-separated origins (e.g. https://your-app.vercel.app). Required for browser calls from Vercel.
inventoryflow.cors.allowed-origins=${INVENTORYFLOW_CORS_ORIGINS:}
