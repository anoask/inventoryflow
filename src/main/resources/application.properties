server.port=8080

## Database (MySQL) — credentials via environment (see backend.env.example)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventoryflow}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## Schema generation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

## No external SQL scripts; seeding uses CommandLineRunner
spring.sql.init.mode=never

## Jackson
spring.jackson.serialization.write_dates_as_timestamps=false

## JWT — set INVENTORYFLOW_JWT_SECRET in real deployments (>= 32 chars). Default is local-dev only.
inventoryflow.jwt.secret=${INVENTORYFLOW_JWT_SECRET:local-dev-only-jwt-secret-min-32chars!}
inventoryflow.jwt.expiration-ms=${INVENTORYFLOW_JWT_EXPIRATION_MS:86400000}
inventoryflow.jwt.issuer=${INVENTORYFLOW_JWT_ISSUER:inventoryflow-api}

## Pagination (Spring Data Web)
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=200
spring.data.web.pageable.one-indexed-parameters=false

